name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-2022
            args: ''
          - platform: ubuntu-22.04
            args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 读取版本号
        id: vars
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: 检查同名 tag 是否已存在
        run: |
          TAG="v${{ steps.vars.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG 已存在，跳过本次发布。请先 bump package.json 版本号再合入 main。"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf \
            libssl-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v${{ steps.vars.outputs.version }}
          releaseName: 'Tool v${{ steps.vars.outputs.version }}'
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            ## Tool v${{ steps.vars.outputs.version }}

            桌面端安装包，覆盖 macOS (Apple Silicon) / Windows (x64) / Linux (x64)。

            ### 下载

            - **macOS (Apple Silicon)**: `tool_aarch64.dmg`
            - **Windows (x64)**: `tool_x64-setup.exe`
            - **Linux (x64)**: `tool_amd64.AppImage` / `.deb`

            ### 已知问题

            - macOS 安装包未签名 / 未公证，首次打开需在「系统设置 → 隐私与安全性」点击「仍要打开」。
            - Windows / Linux 安装包未数字签名，杀毒软件可能误报。
            - 暂未启用应用内自动更新。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}