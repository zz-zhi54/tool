name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target universal-apple-darwin
          - platform: windows-2022
            args: ''
          - platform: ubuntu-22.04
            args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: npm ci

      - name: Compute bare version (strip leading v)
        run: echo "RAW_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build & publish release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tool ${{ github.ref_name }}'
          prerelease: true
          args: ${{ matrix.args }}
          releaseBody: |
            ## Tool ${{ github.ref_name }}

            首个公开预发布版本。

            ### 下载

            文件名格式: `tool_${{ env.RAW_VERSION }}_<target>.<ext>`

            - **macOS (Universal)**: `tool_${{ env.RAW_VERSION }}_universal.dmg`(同时附 `tool_universal.app.tar.gz`)
            - **Windows (x64)**: `tool_${{ env.RAW_VERSION }}_x64-setup.exe`（NSIS 安装包）/ `tool_${{ env.RAW_VERSION }}_x64_en-US.msi`
            - **Linux (x64)**: `tool_${{ env.RAW_VERSION }}_amd64.AppImage` / `tool_${{ env.RAW_VERSION }}_amd64.deb` / `tool-${{ env.RAW_VERSION }}-1.x86_64.rpm`

            ### 已知问题

            - macOS 安装包未签名/未公证，首次打开需要在「系统设置 → 隐私与安全性」点击「仍要打开」。
            - Windows / Linux 安装包未数字签名，杀毒软件可能误报，添加信任即可。
            - 暂未启用应用内自动更新，需手动下载新版本。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
