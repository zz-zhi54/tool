name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 显式 --no-sign，跳过 codesign / ad-hoc 签名；
          # 开源项目不做 Apple 公证，未签名 dmg 在 macOS 上走「未知开发者」
          # 宽容路径（系统设置 → 仍要打开），避免半残 ad-hoc 签名触发
          # Gatekeeper 严格拒绝（症状：tool.app 已损坏，无法打开）。
          - platform: macos-latest
            args: --target aarch64-apple-darwin --no-sign
          - platform: windows-2022
            args: ''
          - platform: ubuntu-22.04
            args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf \
            libssl-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install frontend deps
        run: npm ci

      # 从 CHANGELOG.md 提取当前 version 对应的 `## [X.Y.Z]` 段落作为 releaseBody，
      # 替换早期写死的固定模板。CHANGELOG.md 由 git-cliff 从 Conventional Commits
      # 历史生成（详见 cliff.toml），未发布版本的段落可手写。
      - name: Extract CHANGELOG section
        id: changelog
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '"version"' src-tauri/tauri.conf.json \
            | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
          {
            echo "body<<EOF"
            awk -v v="$VERSION" '
              BEGIN { keep = 0 }
              match($0, /^## \[[0-9]+\.[0-9]+\.[0-9]+\]/) {
                v_full = substr($0, RSTART+4, RLENGTH-5)
                if (keep) exit
                if (v_full == v) keep = 1
              }
              keep { print }
            ' CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # 没找到段落就让 CI 失败，而不是静默发布空 release body。
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md 中未找到版本 $VERSION 的段落"
            exit 1
          fi

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v1
        with:
          tagName: v__VERSION__
          releaseName: 'Tool v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
