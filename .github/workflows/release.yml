name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-2022
            args: ''
          - platform: ubuntu-22.04
            args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf \
            libssl-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v1
        with:
          tagName: v__VERSION__
          releaseName: 'Tool v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            ## Tool v__VERSION__

            桌面端安装包，覆盖 macOS (Apple Silicon) / Windows (x64) / Linux (x64)。

            ### 下载

            - **macOS (Apple Silicon)**: `tool_aarch64.dmg`
            - **Windows (x64)**: `tool_x64-setup.exe`
            - **Linux (x64)**: `tool_amd64.AppImage` / `.deb`

            ### 已知问题

            - macOS 安装包未签名 / 未公证，首次打开需在「系统设置 → 隐私与安全性」点击「仍要打开」。
            - Windows / Linux 安装包未数字签名，杀毒软件可能误报。
            - 应用内自动更新已启用：在「设置 → 关于 → 检查更新」即可一键升级。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
