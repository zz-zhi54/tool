version: 2

updates:
  # Cargo 依赖（Tauri 主体，工作区在 src-tauri/）
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
    commit-message:
      prefix: "deps(tauri)"
    labels:
      - dependencies

  # npm 依赖（前端，根目录）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      prod:
        dependency-type: "production"
      dev:
        dependency-type: "development"
    commit-message:
      prefix: "deps(npm)"
    labels:
      - dependencies

  # GitHub Actions 版本
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - dependencies
