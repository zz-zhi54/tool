<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 底：圆角矩形，暖橙红 -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#F97316"/>

  <!-- 扳手：从中心向 -45° 方向（左下到右上） -->
  <g transform="translate(128 128) rotate(-45)" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- handle 主体：实心矩形 -->
    <rect x="-50" y="-9" width="80" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="none"/>
    <!-- 颈部连接处 -->
    <line x1="30" y1="0" x2="50" y2="0" stroke-width="14"/>
    <!-- 扳手开口端：叉形 -->
    <path d="M 50 -18 L 70 -18 L 70 18 L 50 18 L 50 6 L 64 6 L 64 -6 L 50 -6 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- 螺丝刀：从中心向 +45° 方向（左上到右下），叠加在扳手上方 -->
  <g transform="translate(128 128) rotate(45)" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- handle：实心圆角矩形 -->
    <rect x="-50" y="-10" width="60" height="20" rx="10" ry="10" fill="#FFFFFF" stroke="none"/>
    <!-- shaft：细线 -->
    <line x1="10" y1="0" x2="40" y2="0" stroke-width="10"/>
    <!-- tip：扁平一字口 -->
    <rect x="40" y="-7" width="18" height="14" rx="2" ry="2" fill="#FFFFFF" stroke="none"/>
  </g>
</svg>